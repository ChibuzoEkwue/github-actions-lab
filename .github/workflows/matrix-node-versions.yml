name: Matrix-Node-Versions

on:
  push:

jobs:

  testing:

    strategy:

      matrix:

        version: [18,20,24]

    runs-on: ubuntu-latest
 
    steps:
      - name: checkout-code
        uses: actions/checkout@v7

      - name: setup-node
        uses: actions/setup-node@v7
        with:
          node-version: ${{matrix.version}}
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: run-tests
        run: npm run test