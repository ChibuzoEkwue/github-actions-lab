name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v7

      - name: setup-node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: run-lint
        run: npm run lint