name: Node CI

on:
  push:

jobs:
  testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v7

      - name: setup-node
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: install-dependencies
        run: npm ci

      - name: run-tests
        run: npm run test